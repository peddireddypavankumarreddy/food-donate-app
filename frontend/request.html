<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Food | CareConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body onload="checkAuth(); loadNavbar()">

    <div id="nav"></div>

    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <h2 style="text-align: center; color: #4facfe;">
                <i class="fas fa-bullhorn"></i> Request Food
            </h2>
            <p style="text-align: center; opacity: 0.7; font-size: 14px; margin-bottom: 20px;">
                Tell the community what you need.
            </p>
            
            <form onsubmit="submitRequest(event)">
                <input id="name" type="text" placeholder="Your Full Name" required>
                <input id="phone" type="tel" placeholder="Phone Number (e.g. 9492517158)" required>
                <input id="location" type="text" placeholder="Pickup/Delivery Location" required>
                <textarea id="food" placeholder="What food items do you need? (e.g. 5 meals, Rice, etc.)" 
                          style="width: 100%; height: 100px; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white; outline: none; box-sizing: border-box;" required></textarea>
                
                <button type="submit">Submit Request</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.6;">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
